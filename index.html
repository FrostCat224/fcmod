<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fcmod</title>

    <style>
      body {
        background: black;
        color: white;
        font-family: Verdana;
      }

      h1 {
        margin-bottom: 5px;
      }

      input {
        background: black;
        color: white;
        border: 2px solid white;
        padding: 10px;
        font-family: Verdana;
        width: 300px;
        margin-bottom: 10px;
      }

      .filters {
        margin-bottom: 20px;
      }

      .filters label {
        margin-right: 15px;
        display: inline-block;
      }

      .rainbow-button {
        display: inline-block;
        padding: 12px 24px;
        margin: 5px;
        color: white;
        text-decoration: none;
        background:
          linear-gradient(black, black) padding-box,
          linear-gradient(
            45deg,
            red,
            orange,
            yellow,
            lime,
            cyan,
            blue,
            violet,
            red
          ) border-box;
        border: 3px solid transparent;
        border-radius: 0px;
      }
    </style>
  </head>

  <body>
    <h1>fcmod</h1>

    <p>(home)</p>

    <input type="text" id="search" placeholder="Search..." />

    <div class="filters" id="filters"></div>

    <div id="stuff"></div>

    <script>
      const stuff = [
        {
          name: "Super Mario 64",
          link: "/html/sm64.html",
          system: "N64"
        },
        {
          name: "2048",
          link: "/html/2048.html",
          system: "HTML5"
        },
        {
          name: "3Dash",
          link: "/html/3dash.html",
          system: "HTML5"
        },
        {
          name: "Alex Kidd in Miracle World",
          link: "/html/alexkidd.html",
          system: "Sega Master System"
        },
        {
          name: "Vex",
          link: "/html/vex.html",
          system: "Flash"
        }
      ];

      const filtersDiv = document.getElementById("filters");
      const systems = [...new Set(stuff.map(item => item.system))];

      systems.forEach(system => {
        const label = document.createElement("label");

        label.innerHTML = `
          <input type="checkbox" value="${system}" checked>
          ${system}
        `;

        filtersDiv.appendChild(label);
      });

      const stuffDiv = document.getElementById("stuff");
      const searchInput = document.getElementById("search");

      function renderStuff() {
        stuffDiv.innerHTML = "";

        const search = searchInput.value.toLowerCase();

        const enabledSystems = [
          ...document.querySelectorAll(".filters input:checked")
        ].map(box => box.value);

        const filteredStuff = stuff.filter(item => {
          const matchesSearch =
            item.name.toLowerCase().includes(search);

          const matchesSystem =
            enabledSystems.includes(item.system);

          return matchesSearch && matchesSystem;
        });

        filteredStuff.forEach(item => {
          const button = document.createElement("a");

          button.className = "rainbow-button";
          button.href = item.link;
          button.target = "_blank";

          button.textContent =
            `${item.name} [${item.system}]`;

          stuffDiv.appendChild(button);
        });
      }

      searchInput.addEventListener("input", renderStuff);

      document
        .querySelectorAll(".filters input")
        .forEach(box => {
          box.addEventListener("change", renderStuff);
        });

      renderStuff();
    </script>

    <p>I do not own anything in this site.</p>
    <p>
      If you'd like to contact me for copyright issues,
      e-mail to frostcat224@gmail.com and I will remove whatever you own from this site.
    </p>
  </body>
</html>
